on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]

name: Go
jobs:

  test:
    strategy:
      matrix:
        go-version: [1.24.x, 1.25.x, 1.26.x]
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
    - name: Install Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go-version }}
    - name: Checkout code
      uses: actions/checkout@v7.0.0
    - name: Download Go dependencies
      env:
        GOPROXY: "https://proxy.golang.org"
      run: go mod download
    - name: Test with -race
      run: go test -race -count=1 ./...
    - name: Integration test
      if: matrix.platform == 'ubuntu-latest' && startsWith(matrix.go-version, '1.26')
      run: |
        sudo modprobe nfnetlink_queue
        sudo ip6tables -I OUTPUT -p ipv6-icmp -j NFQUEUE --queue-num 100
        sudo iptables -I OUTPUT -p icmp -j NFQUEUE --queue-num 100
        go test -v -tags integration -exec=sudo -count=1 ./...
  code-base:
    name: code base
    runs-on: ubuntu-24.04
    steps:
      - name: Clone code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: lint
        run: |
          make lint
      - name: fmt
        run: |
          make fmt
